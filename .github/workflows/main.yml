name: Build Sonic 2 ROM

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Lua and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lua5.3 build-essential

    - name: Run Build Script
      run: |
        lua Build.lua

    - name: Upload Built ROM
      uses: actions/upload-artifact@v4
      with:
        name: Sonic2-ROM
        path: |
          *.bin
          *.md
          *.gen
